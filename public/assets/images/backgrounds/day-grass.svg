    <rect x="55" y="100" width="25" height="40" fill="#BAE6FD" stroke="#0369A1" stroke-width="2" />
  </g>

  <!-- Yard fence -->
  <line x1="340" y1="0" x2="340" y2="600" stroke="#1E293B" stroke-width="4" stroke-dasharray="10 10" />
</svg>